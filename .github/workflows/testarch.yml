name: Arch test

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:

      jobs-arch:
        description: Make a choice
        type: choice
        options:
        - arm-
        - arm64
        - other
        - risc-v
        - sim
        - x86_64
        - xtensa

concurrency:
  group: build-man-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  find-item:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: data

      # ── 2. Create a sample JSON file (remove this if you have your own) ────
      - name: Create sample data.json
        run: |
          cat > data/items.json << 'EOF'
        [
          "arm-01", "risc-v-01", "sim-01", "xtensa-01", "arm64-01", "x86_64-01", "other",
          "arm-02", "risc-v-02", "sim-02", "xtensa-02",
          "arm-03", "risc-v-03", "sim-03",
          "arm-04", "risc-v-04",
          "arm-05", "risc-v-05",
          "arm-06", "risc-v-06",
          "arm-07", "arm-08", "arm-09", "arm-10", "arm-11", "arm-12", "arm-13", "arm-14"
        ]
          EOF

      # ── 3. Validate JSON ───────────────────────────────────────────────────
      - name: Validate JSON file
        run: |
          FILE="data/items.json"
          if ! jq empty "$FILE" 2>/dev/null; then
            echo "❌ Invalid JSON: $FILE"
            exit 1
          fi
          echo "✅ JSON is valid"
          echo "Total items: $(jq 'length' "$FILE")"

