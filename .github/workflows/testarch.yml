name: Arch test

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:

      jobs-arch:
        description: Make a choice
        type: choice
        options:
        - arm-
        - arm64
        - other
        - risc-v
        - sim
        - x86_64
        - xtensa

concurrency:
  group: build-man-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  find-item:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      # ── 1. Checkout repo ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: data

      # ── 2. Create a sample JSON file (remove this if you have your own) ────
      - name: Create sample data.json
        run: |
          cat > data/items.json << 'EOF'
          [
            "arm-01", "risc-v-01", "sim-01", "xtensa-01", "arm64-01", "x86_64-01", "other",
            "arm-02", "risc-v-02", "sim-02", "xtensa-02",
            "arm-03", "risc-v-03", "sim-03",
            "arm-04", "risc-v-04",
            "arm-05", "risc-v-05",
            "arm-06", "risc-v-06",
            "arm-07", "arm-08", "arm-09", "arm-10", "arm-11", "arm-12", "arm-13", "arm-14"
          ]
          EOF

      # ── 3. Validate JSON ───────────────────────────────────────────────────
      - name: Validate JSON file
        run: |
          FILE="data/items.json"
          if ! jq empty "$FILE" 2>/dev/null; then
            echo "❌ Invalid JSON: $FILE"
            exit 1
          fi
          echo "✅ JSON is valid"
          echo "Total items: $(jq 'length' "$FILE")"

      # ── 4. Find items using jq ─────────────────────────────────────────────
      - name: Find matching items
        id: find
        run: |
          FILE="data/items.json"
          KEY="${{ github.event.inputs.jobs-arch || 'all' }}"
          # VALUE="${{ github.event.inputs.search_value || 'linux' }}"

          echo "🔍 Searching for: $KEY"
          echo $(jq '.' "$FILE")
          # Find all matches
          # MATCHES=$(jq --arg key "$KEY" --arg val "$VALUE" \
            # '[.[] | select(.[$key] == $val)]' "$FILE")
          MATCHES=$(jq '[.[] | select(test("${{ github.event.inputs.jobs-arch }}"))]' "$FILE")
          COUNT=$(echo "$MATCHES" | jq 'length')

          echo "Found $COUNT match(es):"
          MATRIX=$(echo "$MATCHES" | jq .)
          # echo "$MATCHES" | jq '.'
          # MATRIX=$("$MATCHES" | jq -c .)
          echo "$MATCHES" | jq '.'
          echo "$MATRIX" | jq -rc '.'
          echo "matrix=$MATRIX"               >> $GITHUB_OUTPUT
          # Export for downstream steps
          echo "count=$COUNT"                 >> "$GITHUB_OUTPUT"
          # echo "matrix=$MATCHES"              >> "$GITHUB_OUTPUT"
          # echo "matches<<EOF"               >> "$GITHUB_OUTPUT"
          #echo "$MATCHES"                    >> "$GITHUB_OUTPUT"
          # echo "EOF"                        >> "$GITHUB_OUTPUT"
 
  # Run the selected Linux Builds
  Linux:
    needs: find-item
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        boards: ${{ fromJSON(needs.find-item.outputs.matrix) }}
    steps:
      - name: Show Disk Space
        run: df -h