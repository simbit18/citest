name: Arch test

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:

      jobs-arch:
        description: Make a choice
        type: multi-choice
        options:
        - arm
        - arm64
        - other
      repo_1:
        type: boolean
        default: false
        description: Use Repo 1?
      repo_2:
        type: boolean
        default: false
        description: Use Repo 2?
      repo_3:
        type: boolean
        default: false
        description: Use Repo 3?

concurrency:
  group: build-man-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  Fetch-Source:
    runs-on: ubuntu-latest
    steps:
      - name: View input parameters
        shell: bash
        run: |
          echo "Matrix arch: ${{ inputs.jobs-arch }}"
          echo '{
            "repo_1": ${{ github.event.inputs.repo_1 }},
            "repo_2": ${{ github.event.inputs.repo_2 }},
            "repo_3": ${{ github.event.inputs.repo_3 }}
          }' 
          | echo "repos=$( jq -c 'map_values(. // empty) | keys' )"
          >> $GITHUB_OUTPUT
  job2:
    needs: Fetch-Source
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: ${{ fromJSON(needs.Fetch-Source.outputs.repos) }}
    steps:
      - run: echo ${{ matrix.repo }}
