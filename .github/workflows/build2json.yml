name: 2 Apache NuttX CI json

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build2json.yml'
env:
   REPO_NUTTX_NAME: apache/nuttx
   REF_NUTTX_NAME: master
   REPO_APPS_NAME: apache/nuttx-apps
   REF_APPS_NAME: master

permissions:
  contents: read

concurrency:
  group: build-${{ github.event.pull_request.number }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Fetch-Source:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Target Branches
        id: gittargets
        shell: bash
        run: |
          OS_REF=""
          APPS_REF=""
          REF="refs/heads/master"
          echo "Working with ref: $REF"
      - name: Checkout nuttx repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO_NUTTX_NAME }}
          ref: ${{ env.REF_NUTTX_NAME }}
          path: sources/nuttx
          fetch-depth: 1
      - name: Checkout nuttx repo tags
        run: git -C sources/nuttx fetch --tags

      - name: Checkout apps repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO_APPS_NAME }}
          ref: ${{ env.REF_APPS_NAME }}
          path: sources/apps
          fetch-depth: 1

      - name: Checkout JSON file
        uses: actions/checkout@v6
        with:
          path: sources/data

      # ── 2. Create a sample JSON file (remove this if you have your own) ────
      - name: Create sample data.json
        run: |
          cat > data/items.json << 'EOF'
          [
            { "os": "ubuntu-latest",  "platform": "linux",  "arch": "arm",     "boards": "arm-15" },
            { "os": "ubuntu-latest",  "platform": "linux",  "arch": "xtensa",  "boards": "arm-16" },
            { "os": "ubuntu-latest",  "platform": "linux",  "arch": "sim",     "boards": "sim-04" },
            { "os": "macos-15-intel", "platform": "macos",  "arch": "arm",     "boards": "macos-01" },
            { "os": "windows-latest", "platform": "msys2",  "arch": "risc-v",  "boards": "msys2-01" },
            { "os": "windows-latest", "platform": "msvc",   "arch": "xtensa",  "boards": "windowos" }
          ]
          EOF

      # ── 3. Validate JSON ───────────────────────────────────────────────────
      - name: Validate JSON file
        run: |
          FILE="data/items.json"
          if ! jq empty "$FILE" 2>/dev/null; then
            echo "❌ Invalid JSON: $FILE"
            exit 1
          fi
          echo "✅ JSON is valid"
          echo "Total items: $(jq 'length' "$FILE")"

      - name: Tar sources
        run: |
          tar zcf sources.tar.gz sources
          ls -l sources
          ls -l

      - name: Archive Source Bundle
        uses: actions/upload-artifact@v7
        with:
          name: source-bundle
          path: sources.tar.gz

  # ─────────────────────────────────────────────────────────────
  # Job 1 – Load the build matrix from JSON
  # ─────────────────────────────────────────────────────────────
  Linux-Arch:
    name: Load Build Matrix
    needs: Fetch-Source
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout NuttX
        uses: actions/checkout@v6

      - name: Read matrix JSON
        id: set-matrix
        run: |
          MATRIX=$(cat ./data/items.json | jq -c .)
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          # ROOTDIR=`pwd`
          # echo "ROOTDIR: $ROOTDIR"
          #echo "rootdir=$ROOTDIR" >> "$GITHUB_OUTPUT"
          echo "Loaded matrix:"
          echo "$MATRIX" | jq .

  # ─────────────────────────────────────────────────────────────
  # Job 2 – Build (Linux runners)
  # ─────────────────────────────────────────────────────────────
  build-linux:
    name: "Linux | ${{ matrix.arch }} | ${{ matrix.boards }}"
    needs: load-matrix
    if: ${{ needs.Linux-Arch.outputs.skip_all_builds != '1' }}
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: 1

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Skip non-linux entries
        if: matrix.platform != 'linux'
        run: echo "Skipping non-linux entry" && exit 0
      
      - name: Get Current ROOTDIR
        id: rootdir
        run: |
          ROOTDIR=`pwd`
          echo "ROOTDIR: $ROOTDIR"
          echo "rootdir=$ROOTDIR" >> "$GITHUB_OUTPUT"
      
      - name: Show Disk Space
        run: df -h
      - name: Print platform info
        run: |
          echo "OS:       ${{ matrix.os }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch:     ${{ matrix.arch }}"
          echo "Boards:   ${{ matrix.boards }}"

      - name: Download Source Artifact
        if: matrix.platform == 'linux'
        uses: actions/download-artifact@v7
        with:
          name: source-bundle
          path: .

      - name: Extract sources
        run: |
          tar zxf sources.tar.gz
          ls -la sources
          ls -la sources/dat/citestlist

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Pull
        run: docker pull ghcr.io/apache/nuttx/apache-nuttx-ci-linux

      - name: Export NuttX Repo SHA
        run: echo "nuttx_sha=`git -C sources/nuttx rev-parse HEAD`" >> $GITHUB_ENV

      - name: Run builds
        uses: ./sources/nuttx/.github/actions/ci-container
        env:
          BLOBDIR: /tools/blobs
        with:
          run: |
            echo "::add-matcher::sources/nuttx/.github/gcc.json"
            export ARTIFACTDIR=`pwd`/buildartifacts
            echo "ARTIFACTDIR: $ARTIFACTDIR"
            CITESTLIST=`pwd`/sources/dat/citestlist
            echo ${{ steps.rootdir.outputs.rootdir }}
            echo ${{ github.workspace }}
            # ls -la ${{ steps.rootdir.outputs.rootdir }}
            # ls -la /github/works
            ls -la /github/workspace
            ls -la $CITESTLIST
            git config --global --add safe.directory /github/workspace/sources/nuttx
            git config --global --add safe.directory /github/workspace/sources/apps
            git config --global --add safe.directory /github/workspace/sources/citestlist
            cd sources/nuttx/tools/ci
            if [ "X${{matrix.boards}}" = "Xcodechecker" ]; then
                ./cibuild.sh -c -A -N -R --codechecker testlist/${{matrix.boards}}.dat
            else
                ( sleep 7200 ; echo Killing pytest after timeout... ; pkill -f pytest )&
                ./cibuild.sh -c -A -N -R -S $CITESTLIST/${{matrix.boards}}.dat
            fi

      - name: Post-build Disk Space
        if: always()
        run: df -h

      - uses: actions/upload-artifact@v7.0.0
        if: ${{ always() }}
        with:
          name: linux-${{matrix.boards}}-builds
          path: buildartifacts/
        continue-on-error: true
